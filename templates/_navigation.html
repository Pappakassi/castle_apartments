{% load static %}
<nav class="navbar navbar-expand-lg bg-body-tertiary">
  <div class="container-fluid">
    <a class="navbar-brand" href="/">
      <img src="{% static 'images/castle-apartments-logo.png' %}" class="logo" alt="Castle Apartments Home" />
    </a>
    <button type="button" class="btn btn-dark">Sign up / Log In</button>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link" href="/apartments">Apartments</a>
        </li>
        <li class="nav-item">
          <a class="nav-link disabled" aria-disabled="true">Offers</a>
        </li>
      </ul>
        {% if user.is_authenticated %}
            <form method="post" action="{% url 'logout' %}">
                {% csrf_token %}
                <button type="submit" class="nav-link">Logout</button>
            </form>
        {% else %}
            <a class="nav-link" href="{% url 'register' %}">Register</a>
            <a class="nav-link" href="{% url 'login' %}">Login</a>
        {% endif %}
    </div>
  </div>
</nav>
